name: version-check

on:
  schedule:
    - cron: "37 6 * * *"   # daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev

      - name: Check upstream versions
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}   # lifts the GitHub API rate limit
        run: |
          set +e
          out="$(scripts/version-check.py)"
          code=$?
          echo "$out"
          {
            echo "report<<EOF"
            echo "$out"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "behind=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open issue when packages are behind
        if: steps.check.outputs.behind != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const body = "Automated upstream version check found packages behind:\n\n```\n"
              + `${{ steps.check.outputs.report }}` + "\n```";
            const title = "Upstream version updates available";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "version-check",
            });
            if (existing.data.length) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["version-check"],
              });
            }
