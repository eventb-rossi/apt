name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so changed-packages.sh can diff against the base.
          fetch-depth: 0

      # Compute the rolling cache keys once so the restore and matching save steps
      # below cannot drift apart -- a key mismatch would silently never hit the
      # cache and re-fetch/re-assemble everything on every run.  hashFiles reads
      # the checked-out tree, so this must run after checkout.  Keep the orig key's
      # inputs in sync with the orig invalidation in scripts/ci-build.sh.
      - name: Compute cache keys
        run: |
          {
            echo "ORIG_KEY=orig-v1-${{ hashFiles('packages/*/debian/changelog', 'packages/*/get-orig.sh', 'scripts/lib.sh') }}"
            echo "DOWNLOADS_KEY=downloads-v1-${{ hashFiles('packages/*/get-orig.sh', 'scripts/lib.sh') }}"
          } >> "$GITHUB_ENV"

      # Cache the sbuild chroots used to build cross-series packages (rossi ->
      # resolute).  ci-install-deps.sh (re)creates a chroot only when its tarball
      # is missing, so a restored cache skips the mmdebstrap bootstrap.  Keyed on
      # the series list and the chroot builder, not package versions.
      - name: Cache sbuild chroots
        uses: actions/cache@v5
        with:
          path: ~/.cache/sbuild
          key: sbuild-v1-${{ hashFiles('conf/distributions', 'scripts/make-chroot.sh') }}
          restore-keys: |
            sbuild-v1-

      - name: Install build toolchain
        run: ./scripts/ci-install-deps.sh

      # Restore the assembled orig tarballs: with them present, build-deb.sh skips
      # get-orig.sh entirely for unchanged packages (no upstream downloads, no
      # b2program Gradle build).  Rolling cache -- the key changes when
      # packaging/version/get-orig change, and restore-keys brings back the most
      # recent blob to build on top of.  The matching save (gated to main pushes)
      # runs after the build, so PR runs restore but never write a duplicate blob.
      - name: Restore orig tarballs
        uses: actions/cache/restore@v5
        with:
          path: build/*.orig.tar.gz
          key: ${{ env.ORIG_KEY }}
          restore-keys: |
            orig-v1-

      # Restore raw upstream artifacts; fetch() skips anything already present.
      - name: Restore upstream downloads
        uses: actions/cache/restore@v5
        with:
          path: downloads
          key: ${{ env.DOWNLOADS_KEY }}
          restore-keys: |
            downloads-v1-

      # Build only what changed on pull requests (fast feedback); build the full
      # set on pushes so the uploaded artifact -- and therefore the published
      # repo -- is always complete.  Diff against the PR base SHA (guaranteed
      # present with fetch-depth: 0) rather than a remote-tracking ref.
      - name: Build packages
        env:
          EVENT_TYPE: ${{ github.event_name }}
          RANGE: ${{ github.event_name == 'pull_request' && format('{0}...HEAD', github.event.pull_request.base.sha) || format('{0}..{1}', github.event.before, github.sha) }}
        run: scripts/ci-build.sh

      # Persist the caches only from main pushes: PR / workflow_dispatch runs
      # restore (above) but never write, so they stop creating duplicate ~700 MB
      # blobs of content main already cached.  Same keys as the restore steps; the
      # save is a no-op when the key already exists.  Placed right after the build
      # so a later Lint failure cannot discard freshly assembled origs/downloads.
      - name: Save orig tarballs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v5
        with:
          path: build/*.orig.tar.gz
          key: ${{ env.ORIG_KEY }}

      - name: Save upstream downloads
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v5
        with:
          path: downloads
          key: ${{ env.DOWNLOADS_KEY }}

      - name: Lint
        run: make lint

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs
          path: build/*.deb
          if-no-files-found: ignore

  publish:
    # Publish the APT repository to GitHub Pages from main.
    # Required: repository secret REPO_GPG_PRIVATE_KEY (ASCII-armored) and
    # variable REPO_GPG_KEY (key id/email) to sign the repo.  The job fails
    # rather than publish an unsigned (and therefore unusable) repository.
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v7

      # Publishing only assembles + signs the repo from prebuilt .deb files, so
      # install just reprepro + gnupg instead of the full build toolchain.
      - name: Install repo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends reprepro gnupg

      - name: Import signing key
        env:
          REPO_GPG_PRIVATE_KEY: ${{ secrets.REPO_GPG_PRIVATE_KEY }}
          REPO_GPG_KEY: ${{ vars.REPO_GPG_KEY }}
        run: |
          if [ -z "$REPO_GPG_PRIVATE_KEY" ] || [ -z "$REPO_GPG_KEY" ]; then
            echo "::error::Signing not configured. Set secret REPO_GPG_PRIVATE_KEY and variable REPO_GPG_KEY. Refusing to publish an unsigned repository."
            exit 1
          fi
          echo "$REPO_GPG_PRIVATE_KEY" | gpg --batch --import
          if ! gpg --list-secret-keys "$REPO_GPG_KEY" >/dev/null 2>&1; then
            echo "::error::REPO_GPG_KEY ($REPO_GPG_KEY) does not match any imported secret key."
            exit 1
          fi

      # Reuse the .deb files the build job already produced (it builds the full
      # set on pushes) instead of building everything a second time.
      - name: Download built packages
        uses: actions/download-artifact@v8
        with:
          name: debs
          path: build

      - name: Assemble repository
        env:
          REPO_GPG_KEY: ${{ vars.REPO_GPG_KEY }}
        run: make repo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: repo

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
